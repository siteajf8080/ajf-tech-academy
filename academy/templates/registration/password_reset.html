{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h4 class="mb-0 fw-bold">Reyajiste Modpas</h4>
                    <p class="small mb-0 opacity-75">AJF-Tech | Edikasyon Dijital</p>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4 text-center">
                        Mete adrès imèl ou te itilize pou enskri a, n ap voye yon lyen ba ou pou chwazi yon nouvo modpas.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="id_email" class="form-label fw-bold">Adrès Imèl ou</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="fas fa-envelope text-primary"></i>
                                </span>
                                <input type="email" name="email" autocomplete="email" maxlength="254" 
                                       class="form-control border-start-0 ps-0" 
                                       id="id_email" placeholder="egz: nonou@gmail.com" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">
                                Voye lyen an
                            </button>
                            <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-muted mt-2">
                                <i class="fas fa-arrow-left me-1"></i> Retounen nan Login
                            </a>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3">
                    <small class="text-muted">Bezwen asistans? <a href="#" class="text-primary fw-bold">Kontakte sipò</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f8f9fa;
    }
    .card {
        transition: transform 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
    }
    .btn-primary {
        background-color: #004aad; /* Ble AJF-Tech si se sa w itilize */
        border: none;
    }
    .btn-primary:hover {
        background-color: #003580;
    }
</style>
{% endblock %}
