{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg p-4">
                <div class="card-body">
                    <div class="mb-4">
                        <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <i class="fas fa-check fa-3x"></i>
                        </div>
                    </div>
                    
                    <h3 class="fw-bold text-dark mb-3">Modpas Chanje!</h3>
                    <p class="text-muted mb-4">
                        Bravo! Modpas ou a fin chanje nèt. Ou ka sèvi ak nouvo modpas sa a kounye a pou w antre nan kont ou.
                    </p>
                    
                    <div class="d-grid">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg fw-bold">
                            Konekte kounye a
                        </a>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pb-4">
                    <p class="small text-muted mb-0">Mèsi paske ou fè AJF-Tech konfyans.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f0f2f5;
    }
    .card {
        border-top: 5px solid #198754; /* Vè siksè a */
    }
    .btn-primary {
        background-color: #004aad;
        border: none;
    }
    .btn-primary:hover {
        background-color: #003580;
    }
</style>
{% endblock %}
