{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | AJF-Tech</title>
    <link rel="stylesheet" href="{% static 'academy/css/style.css' %}">
</head>
<body>

<header>
    <div class="logo">
        <img src="{% static 'academy/img/logo.png' %}" alt="AJF-Tech Logo">
    </div>
    <nav>
        <a href="/">Accueil</a>
        <form action="{% url 'logout' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" style="background:#e74c3c; color:white; border:none; padding: 10px 20px; border-radius: 50px; cursor:pointer;">Déconnexion</button>
        </form>
    </nav>
</header>

<div style="max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; font-family: sans-serif;">
    <img src="{{ user.profile.photo.url }}" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid #2ecc71;">
    <h2 style="color: #2c3e50;">{{ user.username }}</h2>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p style="color: #7f8c8d;"><strong>Bio:</strong> {{ user.profile.bio|default:"Ou poko gen bio." }}</p>
    
    <div style="margin-top: 20px;">
        <a href="/" style="background: #34495e; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-right: 10px;">Retour</a>
        <a href="{% url 'edit_profile' %}" style="background: #2ecc71; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Modifier</a>
    </div>
</div>

</body>
</html>
