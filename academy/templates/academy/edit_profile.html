{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier Profil | AJF-Tech</title>
    <link rel="stylesheet" href="{% static 'academy/css/style.css' %}">
</head>
<body style="background: #f4f7f6; font-family: sans-serif;">

<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50;">Modifier mon profil</h2>
    
    <form method="POST" enctype="multipart/form-data"> {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ u_form.as_p }}
            {{ p_form.as_p }}
        </div>
        <button type="submit" style="width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px;">
            Sauvegarder les changements
        </button>
        <a href="{% url 'profile' %}" style="display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none;">Annuler</a>
    </form>
</div>

</body>
</html>
