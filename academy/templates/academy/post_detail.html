{% load static %}
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'news_list' %}">Aktyalite</a></li>
                    <li class="breadcrumb-item active">{{ post.title }}</li>
                </ol>
            </nav>

            <h1 class="fw-bold mb-3">{{ post.title }}</h1>
            <p class="text-muted"><i class="far fa-calendar-alt"></i> Pibliye le {{ post.created_at|date:"d F Y" }}</p>

            {% if post.image %}
            <img src="{{ post.image.url }}" class="img-fluid rounded shadow-sm mb-4" style="width: 100%; max-height: 450px; object-fit: cover;" onerror="this.src='{% static 'academy/img/logo.png' %}'; this.onerror=null;">
            {% endif %}

            <div class="content fs-5" style="line-height: 1.8; color: #444;">
                {{ post.content|linebreaks }}
            </div>

            <hr class="my-5">
            <a href="{% url 'news_list' %}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Tounen nan lis la
            </a>
        </div>
    </div>
</div>
{% endblock %}
